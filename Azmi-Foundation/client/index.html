    <!-- Immediate loading screen: visible before React mounts -->
    <div id="app-loader" style="position:fixed;inset:0;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;">
      <img src="/azmi-logo.png" alt="AZMI Foundation" style="width:64px;height:64px;object-fit:contain;margin-bottom:20px;opacity:0.9;" onerror="this.style.display='none'" />
      <div style="width:36px;height:36px;border:3px solid rgba(255,255,255,0.1);border-top-color:rgba(255,255,255,0.7);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
      <p style="color:rgba(255,255,255,0.4);font-size:11px;margin-top:16px;font-family:sans-serif;letter-spacing:0.15em;text-transform:uppercase;">Loading…</p>
    </div>
    <style>#app-loader{transition:opacity 0.3s}@keyframes spin{to{transform:rotate(360deg)}}</style>
    <script>
      // Remove loader once React has mounted
      document.addEventListener('DOMContentLoaded', function() {
        var observer = new MutationObserver(function() {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            var loader = document.getElementById('app-loader');
            if (loader) { loader.style.opacity = '0'; setTimeout(function(){ loader.remove(); }, 300); }
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root') || document.body, { childList: true, subtree: true });
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
